<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCart BD - ১৬টি প্রিমিয়াম গ্যাজেট</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;500;600;700&family=Inter:wght@400;600;700;800&display=swap');
        .lang-bn { font-family: 'Hind Siliguri', sans-serif; }
        .lang-en { font-family: 'Inter', sans-serif; }
        body { background-color: #f4f4f6; transition: all 0.3s ease; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#fff1f2', 100: '#ffe4e6', 500: '#f57224', 600: '#da5f19', 700: '#b84d10' }
                    }
                }
            }
        }
    </script>
</head>
<body class="text-gray-800 antialiased lang-bn">

    <!-- Header & Body structure remains the same as requested -->
    <div id="top-alert" class="bg-brand-600 text-white text-center py-2 text-xs font-semibold tracking-wide shadow-sm">⚡ মেগা ধামাকা সেল! প্রতিটি গ্যাজেট অর্ডারে পাচ্ছেন নিশ্চিত ডিসকাউন্ট!</div>
    
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-3 py-3 flex items-center justify-between max-w-7xl">
            <div class="flex items-center gap-2">
                <button class="text-gray-600 text-xl"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                <div class="relative bg-gray-50 p-2 rounded-lg border border-gray-200">
                    <i class="fa-solid fa-basket-shopping text-lg"></i>
                    <span id="cart-count" class="absolute -top-1 -right-1 bg-brand-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">0</span>
                </div>
            </div>
            <div class="flex-1 max-w-md mx-4">
                <input type="text" id="search-input" oninput="searchProducts()" placeholder="সার্চ করুন..." class="w-full bg-gray-50 border rounded-lg px-4 py-2 text-sm outline-none">
            </div>
            <div class="flex items-center gap-3">
                <button onclick="toggleLanguage()" class="bg-gray-50 border px-2 py-1 rounded-lg text-xs font-bold text-gray-700"><i class="fa-solid fa-globe text-brand-500 mr-1"></i> <span id="lang-label">EN</span></button>
                <a href="#" class="text-xl font-black">NEX<span class="text-brand-500">CART</span></a>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-2 sm:px-4 py-6 max-w-7xl">
        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3" id="product-grid"></div>
    </main>

    <script>
        let currentLang = 'bn';
        
        // ১৬টি প্রোডাক্টের তালিকা (প্রতিটিতে ৩টি ইমেজ)
        const products = [
            { id: 1, name_bn: "আল্ট্রা স্মার্ট ওয়াচ", name_en: "Ultra Smart Watch", price: 1499, originalPrice: 2499, rating: 4.9, images: ["https://images.unsplash.com/photo-1523275335684-37898b6baf30", "https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1", "https://images.unsplash.com/photo-1544117519-31a4b718113d"], colors: ["Black", "Silver"] },
            { id: 2, name_bn: "প্রো ইয়ারবাডস", name_en: "Pro TWS Earbuds", price: 899, originalPrice: 1499, rating: 4.8, images: ["https://images.unsplash.com/photo-1590658268037-6bf12165a8df", "https://images.unsplash.com/photo-1546435770-a3e426bf472b", "https://images.unsplash.com/photo-1608156639585-b3a032ef9689"], colors: ["White", "Black"] },
            { id: 3, name_bn: "টার্বো ডেস্ক ফ্যান", name_en: "Turbo Desk Fan", price: 1150, originalPrice: 1915, rating: 4.7, images: ["https://images.unsplash.com/photo-1618945533005-79b13ed62282", "https://images.unsplash.com/photo-1565151443-3259c47114ee", "https://images.unsplash.com/photo-1582268611957-55095d2c9027"], colors: ["White", "Green"] },
            { id: 4, name_bn: "পাওয়ার ব্যাংক ২০০০০", name_en: "20,000mAh Power Bank", price: 1350, originalPrice: 2250, rating: 4.9, images: ["https://images.unsplash.com/photo-1609592424085-f6df46001004", "https://images.unsplash.com/photo-1622445262461-c3b81b37a531", "https://images.unsplash.com/photo-1591405352385-2313628e8334"], colors: ["Black", "Blue"] },
            { id: 5, name_bn: "ব্লুটুথ স্পিকার", name_en: "Bluetooth Speaker", price: 1200, originalPrice: 2000, rating: 4.6, images: ["https://images.unsplash.com/photo-1589256469067-ea99122bbdc3", "https://images.unsplash.com/photo-1545454675-3531b57675f0", "https://images.unsplash.com/photo-1555523450-f1c50059c381"], colors: ["Red", "Black"] },
            { id: 6, name_bn: "গেমিং মাউস", name_en: "Gaming Mouse", price: 750, originalPrice: 1200, rating: 4.8, images: ["https://images.unsplash.com/photo-1615663245857-ac93bb7c39e7", "https://images.unsplash.com/photo-1527814332306-05608c79294f", "https://images.unsplash.com/photo-1563297157-19e4922119c4"], colors: ["Black"] },
            { id: 7, name_bn: "মেকানিক্যাল কিবোর্ড", name_en: "Mechanical Keyboard", price: 2500, originalPrice: 3500, rating: 4.9, images: ["https://images.unsplash.com/photo-1587829741301-dc798b83add3", "https://images.unsplash.com/photo-1601445638532-3c6f6c3aa1d6", "https://images.unsplash.com/photo-1618384887929-16d33fab4d59"], colors: ["White", "Black"] },
            { id: 8, name_bn: "ইউএসবি ক্যাবল", name_en: "Fast USB-C Cable", price: 350, originalPrice: 600, rating: 4.5, images: ["https://images.unsplash.com/photo-1584006682522-680562e81be3", "https://images.unsplash.com/photo-1556656793-02f661019688", "https://images.unsplash.com/photo-1577705995045-81203023f03e"], colors: ["White"] },
            { id: 9, name_bn: "স্মার্ট এলইডি বাল্ব", name_en: "Smart LED Bulb", price: 450, originalPrice: 800, rating: 4.7, images: ["https://images.unsplash.com/photo-1550684848-fac1c5b4e853", "https://images.unsplash.com/photo-1513506003901-1e6a229e2d15", "https://images.unsplash.com/photo-1543906953-556100e90521"], colors: ["White"] },
            { id: 10, name_bn: "নেক ব্যান্ড ইয়ারফোন", name_en: "Neckband Earphone", price: 950, originalPrice: 1500, rating: 4.6, images: ["https://images.unsplash.com/photo-1505740420928-5e560c06d30e", "https://images.unsplash.com/photo-1524678606370-a47ad25cb82a", "https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5"], colors: ["Black"] },
            { id: 11, name_bn: "ফোন স্ট্যান্ড", name_en: "Phone Stand", price: 299, originalPrice: 500, rating: 4.4, images: ["https://images.unsplash.com/photo-1589492477829-5e65395b66cc", "https://images.unsplash.com/photo-1596742578443-7682f52dca9c", "https://images.unsplash.com/photo-1601784551446-20c9e07cdbdb"], colors: ["Silver", "Black"] },
            { id: 12, name_bn: "ওয়্যারলেস চার্জার", name_en: "Wireless Charger", price: 850, originalPrice: 1300, rating: 4.5, images: ["https://images.unsplash.com/photo-1603506488328-912b71e06f0e", "https://images.unsplash.com/photo-1592924357228-9564da86a58b", "https://images.unsplash.com/photo-1601784551446-20c9e07cdbdb"], colors: ["Black"] },
            { id: 13, name_bn: "গিম্বল স্ট্যাবিলাইজার", name_en: "Gimbal Stabilizer", price: 4500, originalPrice: 6000, rating: 4.8, images: ["https://images.unsplash.com/photo-1595675024853-0f3ec9098ac7", "https://images.unsplash.com/photo-1595675024853-0f3ec9098ac7", "https://images.unsplash.com/photo-1516035069371-29a1b244cc32"], colors: ["Black"] },
            { id: 14, name_bn: "ট্রাইপড স্ট্যান্ড", name_en: "Tripod Stand", price: 1100, originalPrice: 1800, rating: 4.6, images: ["https://images.unsplash.com/photo-1586716402203-792136e58d08", "https://images.unsplash.com/photo-1500336624523-d727130c3328", "https://images.unsplash.com/photo-1554080353-a576cf803bda"], colors: ["Black"] },
            { id: 15, name_bn: "স্মার্ট ব্যান্ড", name_en: "Smart Band", price: 1250, originalPrice: 2100, rating: 4.7, images: ["https://images.unsplash.com/photo-1579586337278-3befd40fd17a", "https://images.unsplash.com/photo-1579586337278-3befd40fd17a", "https://images.unsplash.com/photo-1508685096489-7aacd43bd3b1"], colors: ["Black", "Blue"] },
            { id: 16, name_bn: "ওয়েবক্যাম এইচডি", name_en: "HD Webcam", price: 1800, originalPrice: 2800, rating: 4.5, images: ["https://images.unsplash.com/photo-1603302576837-37561b2e2302", "https://images.unsplash.com/photo-1585675417387-578b9b465715", "https://images.unsplash.com/photo-1593642634367-d95a832e87d6"], colors: ["Black"] }
        ];

        function toggleLanguage() {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';
            document.getElementById('lang-label').innerText = currentLang === 'bn' ? 'EN' : 'বাং';
            renderProducts(products);
        }

        function renderProducts(productsList) {
            const container = document.getElementById('product-grid');
            container.innerHTML = "";
            productsList.forEach(p => {
                const name = currentLang === 'bn' ? p.name_bn : p.name_en;
                container.innerHTML += `
                <div class="bg-white border rounded shadow-sm hover:shadow-lg transition overflow-hidden">
                    <img id="img-${p.id}" src="${p.images[0]}" class="w-full h-40 object-cover">
                    <div class="flex p-1 gap-1">
                        ${p.images.map(img => `<img src="${img}" onclick="document.getElementById('img-${p.id}').src='${img}'" class="w-8 h-8 rounded border cursor-pointer">`).join('')}
                    </div>
                    <div class="p-3">
                        <h3 class="text-sm font-semibold h-10 overflow-hidden">${name}</h3>
                        <div class="text-brand-500 font-bold mt-2">৳${p.price}</div>
                        <button class="w-full bg-brand-500 text-white py-1.5 mt-3 rounded text-xs font-bold">অর্ডার করুন</button>
                    </div>
                </div>`;
            });
        }
        renderProducts(products);
    </script>
</body>
</html>
