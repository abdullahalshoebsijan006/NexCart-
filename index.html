<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCart BD - Premium Gadget Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;500;600;700&family=Inter:wght@400;600;700;800&display=swap');
        .lang-bn { font-family: 'Hind Siliguri', sans-serif; }
        body { background-color: #fafafa; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: { colors: { brand: { 500: '#f57224', 600: '#da5f19' } } }
            }
        }
    </script>
</head>
<body class="text-gray-800 antialiased lang-bn">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-40 shadow-sm">
        <div class="container mx-auto px-4 py-4 flex items-center justify-between max-w-7xl">
            <a href="#" class="text-2xl font-black text-gray-900">NEX<span class="text-brand-500">CART</span></a>
            <input type="text" id="search-input" oninput="searchProducts()" placeholder="প্রোডাক্ট খুঁজুন..." class="bg-gray-100 px-4 py-2 rounded-full text-sm outline-none w-64 focus:ring-2 focus:ring-brand-500">
        </div>
    </header>

    <main class="container mx-auto px-4 py-10 max-w-7xl">
        <h2 class="text-2xl font-bold mb-8">ট্রেন্ডিং গ্যাজেটসমূহ</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="product-grid">
            </div>
        <div id="no-products" class="hidden text-center py-20 text-gray-500">কোনো প্রোডাক্ট পাওয়া যায়নি!</div>
    </main>

    <script>
        const products = [
            { id: 1, name_bn: "Ultra Smart Watch Series 9", price: 1499, originalPrice: 2499, image: "https://picsum.photos/500/500?random=1" },
            { id: 2, name_bn: "Pro TWS Earbuds Bass Edition", price: 899, originalPrice: 1499, image: "https://picsum.photos/500/500?random=2" },
            { id: 3, name_bn: "High Speed Turbo Desk Fan", price: 1150, originalPrice: 1915, image: "https://picsum.photos/500/500?random=3" },
            { id: 4, name_bn: "20,000mAh Fast Power Bank", price: 1350, originalPrice: 2250, image: "https://picsum.photos/500/500?random=4" },
            { id: 5, name_bn: "RGB Mechanical Gaming Keyboard", price: 2450, originalPrice: 3800, image: "https://picsum.photos/500/500?random=5" },
            { id: 6, name_bn: "Wireless Ergonomic Gaming Mouse", price: 799, originalPrice: 1299, image: "https://picsum.photos/500/500?random=6" },
            { id: 7, name_bn: "4K Ultra HD Webcam with Mic", price: 1850, originalPrice: 2800, image: "https://picsum.photos/500/500?random=7" },
            { id: 8, name_bn: "Portable Bluetooth Speaker", price: 1250, originalPrice: 1999, image: "https://picsum.photos/500/500?random=8" }
        ];

        function renderProducts(productsList) {
            const productGrid = document.getElementById('product-grid');
            const noProductsEl = document.getElementById('no-products');
            productGrid.innerHTML = "";

            if (productsList.length === 0) {
                noProductsEl.classList.remove('hidden');
                return;
            }
            noProductsEl.classList.add('hidden');

            productsList.forEach(product => {
                const discount = Math.round(((product.originalPrice - product.price) / product.originalPrice) * 100);
                const card = document.createElement('div');
                card.className = "group bg-white border border-gray-100 rounded-2xl overflow-hidden hover:border-brand-500 hover:shadow-2xl hover:shadow-brand-500/10 transition-all duration-500 flex flex-col";
                card.innerHTML = `
                    <div class="relative aspect-[4/3] overflow-hidden">
                        <img src="${product.image}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-brand-600 text-[10px] font-black px-2 py-1 rounded-full shadow-sm">
                            -${discount}% OFF
                        </div>
                    </div>
                    <div class="p-5 flex flex-col flex-1">
                        <h3 class="text-gray-900 text-sm sm:text-base font-bold mb-2 line-clamp-1 group-hover:text-brand-600 transition cursor-pointer">
                            ${product.name_bn}
                        </h3>
                        <div class="flex items-center gap-2 mb-4">
                            <span class="text-brand-600 text-lg font-black">৳${product.price}</span>
                            <span class="text-gray-400 line-through text-xs font-medium">৳${product.originalPrice}</span>
                        </div>
                        <div class="mt-auto flex gap-2">
                            <button class="w-full bg-gray-900 hover:bg-brand-600 text-white font-bold py-2.5 rounded-xl transition-all duration-300 text-xs shadow-lg">
                                অর্ডার করুন
                            </button>
                            <button class="bg-gray-100 hover:bg-gray-200 text-gray-700 px-4 rounded-xl transition-all duration-300">
                                <i class="fa-solid fa-cart-shopping"></i>
                            </button>
                        </div>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }

        function searchProducts() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase();
            const filtered = products.filter(p => p.name_bn.toLowerCase().includes(searchTerm));
            renderProducts(filtered);
        }

        renderProducts(products);
    </script>
</body>
</html>
