<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexCart BD - 16 Premium Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Hind_Siliguri:wght@400;500;600;700&family=Inter:wght@400;600;700;800&display=swap');
        .lang-bn { font-family: 'Hind Siliguri', sans-serif; }
        .lang-en { font-family: 'Inter', sans-serif; }
        body { background-color: #f4f4f6; transition: all 0.3s ease; }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 500: '#f57224', 600: '#da5f19' } } } } }
    </script>
</head>
<body class="text-gray-800 antialiased lang-bn">

    <!-- হেডার -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-3 py-3 flex items-center justify-between max-w-7xl">
            <div class="flex items-center gap-2 shrink-0">
                <button class="text-gray-600 text-xl"><i class="fa-solid fa-ellipsis-vertical"></i></button>
            </div>
            <div class="flex-1 max-w-md mx-2">
                <input type="text" id="search-input" oninput="searchProducts()" placeholder="পছন্দের প্রোডাক্ট সার্চ করুন..." class="w-full bg-gray-50 border rounded-lg pl-3 py-2 text-sm outline-none">
            </div>
            <div class="flex items-center gap-2">
                <button onclick="toggleLanguage()" class="text-[11px] font-bold bg-gray-100 px-2 py-1 rounded">EN</button>
                <a href="#" class="text-xl font-black">NEX<span class="text-brand-500">CART</span></a>
            </div>
        </div>
    </header>

    <!-- মেইন কন্টেন্ট -->
    <main class="container mx-auto px-2 py-6 max-w-7xl">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-3" id="product-grid"></div>
    </main>

    <!-- গ্যালারি মোডাল (৩টি ছবি একসাথে দেখার জন্য) -->
    <div id="gallery-modal" class="fixed inset-0 bg-black/90 z-[100] flex items-center justify-center hidden p-4" onclick="closeGallery()">
        <div class="bg-white p-4 rounded-xl max-w-2xl w-full" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-bold">Product Gallery</h3>
                <button onclick="closeGallery()" class="text-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div id="gallery-container" class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <!-- ইমেজ এখানে লোড হবে -->
            </div>
        </div>
    </div>

    <script>
        // ১৬টি প্রোডাক্টের ডাটা (প্রতিটিতে ৩টি করে ছবি)
        const products = Array.from({ length: 16 }, (_, i) => ({
            id: i + 1,
            name_bn: `প্রোডাক্ট নাম ${i + 1}`,
            name_en: `Product Name ${i + 1}`,
            price: 500 + (i * 100),
            originalPrice: 1000 + (i * 100),
            images: [
                `https://picsum.photos/id/${10 + i}/400/400`,
                `https://picsum.photos/id/${20 + i}/400/400`,
                `https://picsum.photos/id/${30 + i}/400/400`
            ],
            rating: 4.5
        }));

        let currentLang = 'bn';

        function renderProducts(list) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = list.map(p => `
                <div class="bg-white border rounded shadow-sm hover:shadow-md transition p-2">
                    <img src="${p.images[0]}" onclick="openGallery(${JSON.stringify(p.images).replace(/"/g, '&quot;')})" class="w-full aspect-square object-cover cursor-pointer rounded mb-2">
                    <h3 class="text-sm font-bold">${currentLang === 'bn' ? p.name_bn : p.name_en}</h3>
                    <div class="text-brand-500 font-bold">৳${p.price}</div>
                    <button onclick="alert('Added to cart')" class="w-full mt-2 bg-brand-500 text-white text-xs py-1.5 rounded">অর্ডার করুন</button>
                </div>
            `).join('');
        }

        // গ্যালারি ওপেন করার ফাংশন
        function openGallery(imagesArray) {
            const container = document.getElementById('gallery-container');
            container.innerHTML = imagesArray.map(img => `
                <img src="${img}" class="w-full h-48 object-cover rounded shadow">
            `).join('');
            document.getElementById('gallery-modal').classList.remove('hidden');
        }

        function closeGallery() {
            document.getElementById('gallery-modal').classList.add('hidden');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';
            document.body.className = `text-gray-800 ${currentLang === 'bn' ? 'lang-bn' : 'lang-en'}`;
            renderProducts(products);
        }

        function searchProducts() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = products.filter(p => p.name_bn.toLowerCase().includes(term) || p.name_en.toLowerCase().includes(term));
            renderProducts(filtered);
        }

        renderProducts(products);
    </script>
</body>
</html>
